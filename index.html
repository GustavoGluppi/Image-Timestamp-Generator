<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Timestamp Generator</title>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./styles.css" />

    <script type="module" src="./index.js"></script>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./map.js" async defer></script>
  </head>
  <body>
    <div id="timestampSettings">
      <textarea id="importStyleText"></textarea>
      <br />
      <button id="importStyleButton">Importar estilo</button>
      <br />
      <br />

      <label for="textColorSelector">Cor do texto</label>
      <br />
      <input id="textColorSelector" type="color" value="#FFFFFF" />
      <br />
      <br />

      <label for="fontSizeInput">Tamanho da fonte</label>
      <br />
      <input id="fontSizeInput" type="number" value="12" />
      <br />
      <br />

      <label for="textBorderColorSelector">Cor da borda</label>
      <br />
      <input id="textBorderColorSelector" type="color" value="#000000" />
      <br />
      <br />

      <label for="textBorderSizeInput">Tamanho da borda</label>
      <br />
      <input id="textBorderSizeInput" type="number" value="1.5" />
      <br />
      <br />

      <label for="textPaddingInput">Distanciamento dos textos</label>
      <br />
      <input id="textPaddingInput" type="number" value="15" />
      <br />
      <br />

      <label for="textPosition">Posição do texto</label>
      <br />
      <select id="textPosition">
        <option value="bottomRight">Canto inferior direito</option>
        <option value="bottomLeft">Canto inferior esquerdo</option>
        <option value="topRight">Canto superior direito</option>
        <option value="topLeft">Canto superior esquerdo</option>
      </select>
      <br />
      <br />

      <button type="button" id="saveFormCookiesButton">Salvar estilo</button>
      <button type="button" id="copyStyleButton">Copiar estilo</button>
    </div>

    <br />
    <br />

    <div id="timestampValues" action="">
      <label for="datetimeInput">Data e hora</label>
      <br />
      <input id="datetimeInput" type="datetime-local" />
      <br />
      <br />

      <label for="cep">CEP</label>
      <br />
      <input id="cep" type="text" />
      <button type="button" id="searchCepButton">Buscar CEP</button>
      <br />
      <br />

      <label for="street">Rua</label>
      <br />
      <input id="street" type="text" />
      <br />
      <br />

      <label for="district">Bairro</label>
      <br />
      <input id="district" type="text" />
      <br />
      <br />

      <label for="city">Cidade</label>
      <br />
      <input id="city" type="text" />
      <br />
      <br />

      <label for="state">Estado</label>
      <br />
      <input id="state" type="text" />
      <br />
      <br />

      <input id="fileSelector" type="file" accept=".png,.jpg,.jpeg" />
      <br />
      <br />

      <div id="map"></div>
    </div>

    <br />
    <br />

    <button type="button" id="generateImageButton">Gerar imagem</button>

    <br />
    <br />

    <canvas
      id="canvas-image"
      height="800px"
      width="450px"
      style="border: 1px solid #000000"
    >
      Ocorreu um erro!
    </canvas>

    <br />

    <a id="link" download="image.png" href="">Baixar Imagem</a>
  </body>
</html>
